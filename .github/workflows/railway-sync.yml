name: Railway Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Sync mode to trigger on Railway
        required: true
        default: auto
        type: choice
        options:
          - auto
          - customers-full
          - orders-full
          - full

permissions:
  contents: read

concurrency:
  group: railway-sync
  cancel-in-progress: false

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SYNC_TRIGGER_URL: ${{ secrets.SYNC_TRIGGER_URL }}
      SYNC_ADMIN_TOKEN: ${{ secrets.SYNC_ADMIN_TOKEN }}
      SYNC_MODE: ${{ github.event.inputs.mode || 'auto' }}
    steps:
      - name: Validate configuration
        run: |
          if [ -z "$SYNC_TRIGGER_URL" ]; then
            echo "Missing GitHub secret: SYNC_TRIGGER_URL"
            exit 1
          fi
          if [ -z "$SYNC_ADMIN_TOKEN" ]; then
            echo "Missing GitHub secret: SYNC_ADMIN_TOKEN"
            exit 1
          fi

      - name: Trigger Railway sync
        run: |
          payload=$(printf '{"mode":"%s","trigger":"github-actions"}' "${SYNC_MODE:-auto}")
          http_code=$(curl --silent --show-error --output response.json \
            --write-out "%{http_code}" \
            --request POST \
            --header "Authorization: Bearer $SYNC_ADMIN_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "$SYNC_TRIGGER_URL")

          cat response.json

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Sync trigger failed with HTTP $http_code"
            exit 1
          fi

      - name: Print acceptance state
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          body = json.loads(Path("response.json").read_text())
          accepted = body.get("accepted")
          if accepted is False:
              raise SystemExit("Railway backend rejected the sync request")
          print(f"accepted={accepted}")
          print(f"mode={body.get('mode')}")
          PY
